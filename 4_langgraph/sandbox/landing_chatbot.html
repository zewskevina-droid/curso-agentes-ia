<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot de Prueba ZEWS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #0056b3;
            text-align: center;
        }
        .chatbot-container {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #0056b3;
            border-radius: 10px;
            background-color: #fff;
        }
        .chatbot {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow-y: auto;
            padding: 10px;
        }
        .input-container {
            display: flex;
            margin-top: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .input-container button {
            padding: 10px;
            background-color: #0056b3;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
        }
        .input-container button:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>
    <h1>Chatbot de Prueba ZEWS</h1>
    <div class="chatbot-container">
        <div class="chatbot" id="chatbot">
            <p>Bienvenido al chatbot de ZEWS. ¿Cómo puedo ayudarte hoy?</p>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta aquí...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const userInput = document.getElementById('userInput').value;
            const chatbot = document.getElementById('chatbot');
            if (userInput) {
                const userMessage = `<p><strong>Tú:</strong> ${userInput}</p>`;
                chatbot.innerHTML += userMessage;
                document.getElementById('userInput').value = '';
                // Respuesta general del chatbot
                const botResponse = `<p><strong>Bot:</strong> Gracias por tu pregunta sobre ZEWS. Puedes visitar nuestro sitio web en <a href='https://zewsweb.com' target='_blank'>zewsweb.com</a>.</p>`;
                chatbot.innerHTML += botResponse;
                chatbot.scrollTop = chatbot.scrollHeight;
            }
        }
    </script>
</body>
</html>
