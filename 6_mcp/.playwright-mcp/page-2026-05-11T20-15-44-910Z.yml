              - heading "Ingredientes" [level=2] [ref=e140]
              - list [ref=e141]:
                - listitem [ref=e142]: 4 piezas o trozos de pollo (preferiblemente muslos)
                - listitem [ref=e143]: 100 ml. de aceite de oliva virgen extra
                - listitem [ref=e144]: 320 g. de arroz de grano largo
                - listitem [ref=e145]: 250 ml. de cerveza (o vino blanco)
                - listitem [ref=e146]: 60 ml. de salsa de tomate
                - listitem [ref=e147]: 800 ml. de caldo de pollo
                - listitem [ref=e148]: 1 pimiento rojo
                - listitem [ref=e149]: 1 pimiento verde
                - listitem [ref=e150]: 1 diente de ajo
                - listitem [ref=e151]: 1/2 cucharadita de comino
                - listitem [ref=e152]: 1/2 cebolla morada
                - listitem [ref=e153]: 1 cucharadita de bijol, colorante amarillo o azafrán molido
                - listitem [ref=e154]: 30 g. de guisantes en conserva o chícharos
                - listitem [ref=e155]: 1 hoja de laurel
                - listitem [ref=e156]: 1 cucharadita de pimentón dulce
                - listitem [ref=e157]: 1 ají grande (opcional)
                - listitem [ref=e158]: 2 g. de pimienta negra recién molida (opcional)
                - listitem [ref=e159]: 5 g. de sal fina (o al gusto de cada casa)
                - listitem [ref=e160]: Opcional para decorar, perejil fresco
              - button "Ir al paso a paso ↓" [ref=e161] [cursor=pointer]
            - paragraph [ref=e163]:
              - text: La receta que vamos a preparar hoy nos traslada directamente a la Habana. El
              - link "arroz con pollo" [ref=e164] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/receta-de-arroz-con-pollo-y-verduras/581/
              - text: a la chorrera es una
              - link "receta de arroz meloso" [ref=e165] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/todas/recetas/arroces/recetas-con-arroz-meloso/
                - strong [ref=e166]: receta de arroz meloso
              - text: típica de Cuba que se caracteriza por incluir cerveza durante la cocción.
            - paragraph [ref=e167]: Cierra los ojos e imagina que estás en una pequeña casa de La Habana. Es un día soleado y de fondo alcanzas a escuchar una radio local que reproduce ritmos de una rumba cubana. Estás tranquilamente tumbado en una hamaca en mitad del porche cuando un chico te llama, con esa gracia cubana, para avisarte que la comida ya está lista. Te diriges a la mesa y tu nariz ya huele los fabulosos aromas que desprende el plato que acaban de servir, un arroz con pollo a la chorrera.
            - paragraph [ref=e169]:
              - text: El arroz está jugoso y lleno de sabor, y el pollo está tierno y sabroso. En la mesa también te han servido un
              - link "mojito cubano" [ref=e170] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/como-hacer-un-mojito-cubano-perfecto/16486/
                - strong [ref=e171]: mojito cubano
              - text: para ayudar a pasar el arroz. Y es que
              - strong [ref=e172]: este plato te traslada directamente a un país donde la gente es más feliz y el tiempo pasa más despacio
              - text: . Disfrútalo.
            - paragraph [ref=e174]:
              - text: Esta receta
              - link "es muy sencilla de preparar" [ref=e175] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/recetas-faciles/
                - strong [ref=e176]: es muy sencilla de preparar
              - text: y es una variante del arroz con pollo internacional. La diferencia es que en este caso se usa más caldo y el arroz tiene un aspecto más caldoso. Si quieres preparar otras variantes de esta receta internacional, te recomendamos, el
              - link "arroz con pollo al curry" [ref=e177] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/pollo-al-curry-con-arroz-basmati-receta-paso-a-paso/8199/
                - strong [ref=e178]: arroz con pollo al curry
              - text: ","
              - link "arroz a la cubana" [ref=e179] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/arroz-a-la-cubana/14140/
                - strong [ref=e180]: arroz a la cubana
              - text: ","
              - link "arroz con frijoles a la cubana" [ref=e181] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/arroz-con-frijoles-a-la-cubana/34556/
                - strong [ref=e182]: arroz con frijoles a la cubana
              - text: o
              - link "arroz chaufa" [ref=e183] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/arroz-con-frijoles-a-la-cubana/34556/
                - strong [ref=e184]: arroz chaufa
              - text: peruano.
            - heading "Receta de arroz a la chorrera" [level=2] [ref=e185]
            - figure [ref=e186]:
              - img "Arroz con pollo a la chorrera. Receta al estilo cubano" [ref=e187]
            - heading "Preparación receta arroz con pollo a la chorrera" [level=3] [ref=e188]
            - list [ref=e189]:
              - listitem [ref=e190]: Empezamos la receta partiendo la cebolla en trozos pequeños. También picamos los ajos muy finamente. Cortamos los pimientos en juliana (en tiras) y reservamos todo.
              - listitem [ref=e191]: En una olla o cazuela grande, ponemos el aceite y dejamos que se caliente. Mientras tanto, vamos salpimentando los trozos de pollo y los ponemos en la cazuela. Durante unos 6 minutos vamos a ir dorando todas las caras de la carne.
              - listitem [ref=e193]: Cuando los tengamos, retiramos todo el pollo y sofreímos la cebolla, el pimiento y el ajo por 2 minutos a fuego medio. Mezclamos todo bien. Si al sacar el pollo ves que falta aceite puedes echarle una nueva cucharada. Quitamos el pimiento una vez hecho y reservamos para la decoración final. Cuando la cebolla esté transparente, añadimos el arroz, sofriéndolo hasta que se vuelva transparente y mezclándolo todo bien
              - listitem [ref=e194]: Una vez listo el arroz, añadimos el comino, el azafrán (o bijol), la salsa de tomate y cocinamos 1 minuto más, mezclándolo todo para que se integre bien. Enseguida añadimos el caldo y la cerveza. Subimos el fuego y mezclamos todo bien para que se cocine de forma homogénea.
              - listitem [ref=e195]: A continuación, agregamos sal, pimienta molida al gusto y la hoja de laurel. Si os gusta el picante, sería el momento de añadir el ají, yo lo suelo poner entero, para luego localizarlo. Por último, añadimos la carne y dejamos cocinar durante 3 minutos a fuego alto para que se evapore parte del alcohol de la cerveza. Bajamos el fuego a media potencia, tapamos y cocinamos durante 18 minutos más.
              - listitem [ref=e196]: Antes de llegar a cumplir los 18 minutos, cuando todavía queden al menos 5, añadimos los guisantes, removemos y terminamos de cocinar. Al finalizar, dejamos reposar el arroz durante 10 minutos más, quitamos la hoja de laurel.
              - listitem [ref=e197]: Cortamos los pimientos en tiras y decoramos la cazuela con el pimiento antes de servir. Listo para que cada comensal se sirva en su plato, con un trozo de pollo para cada persona. Espero que os guste.
            - heading "Consejos para un arroz a la chorrera de rechupete" [level=2] [ref=e199]
            - list [ref=e200]:
              - listitem [ref=e201]: Te recomendamos usar arroz de grano largo. Para este plato queda muy bien, más suelto y jugoso. Los tiempos de cocción los hemos dado para este tipo de arroz. Si no tuvieras este tipo de arroz, podrías utilizar un arroz redondo tipo bomba, ajustando los tiempos de cocción (unos 14 minutos en vez de 18).
              - listitem [ref=e202]: Es importante que a la hora de picar las verduras hagas los trocitos muy pequeños, así conseguirás que no se note su textura, pero sí el sabor que le da al arroz.
              - listitem [ref=e203]: Para darle más sabor al pollo puedes exprimir medio limón sobre las piezas cuando las salpimientes.
              - listitem [ref=e204]: El caldo de pollo debe verterse ya caliente y la cerveza a temperatura ambiente.
              - listitem [ref=e205]: La proporción total es de 2 medidas y media de líquido por cada taza de arroz, en este caso 320 g. de arroz y unos 800 ml. de líquido. Ten en cuenta que es un arroz que debe quedar meloso si lo quieres hacer con el auténtico estilo cubano.
              - listitem [ref=e206]: Es preferible que no laves el arroz. El almidón del arroz ayuda a que quede más cremoso el plato.
              - listitem [ref=e207]: Cuidado al remover los guisantes, son muy delicados y podrían llegar a romperse.
            - figure [ref=e208]:
              - img "Arroz con pollo a la chorrera. Receta al estilo cubano" [ref=e209]
            - heading "El origen de la receta del arroz con pollo a la chorreta" [level=2] [ref=e210]
            - paragraph [ref=e211]:
              - text: El nombre de este plato viene del
              - strong [ref=e212]: antiguo hotel Casa Arana
              - text: (ya cerrado) donde se cocinaba este plato. El hotel se encontraba cerca del torreón de la Chorrera, una construcción que formaba parte de la defensa de la ciudad de la Habana, y de ahí coge el nombre este plato. El escritor Waldo Álvarez Insua menciona este plato en su novela
              - emphasis [ref=e213]: "Finis: Últimos días de España en Cuba"
              - text: (1901). A día de hoy es una receta que en toda casa cubana saben hacer.
            - paragraph [ref=e214]:
              - text: Parece ser que el arroz a la chorrera tiene su origen en la
              - link "paella valenciana" [ref=e215] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/paella-valenciana/21607/
                - strong [ref=e216]: paella valenciana
              - text: . Aunque a diferencia del plato valenciano, en este, el arroz queda más meloso, como si fuera un
              - link "risotto" [ref=e217] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/todas/recetas/arroces/recetas-de-risotto/
                - strong [ref=e218]: risotto
              - text: . En Valencia, la paella se cocina con azafrán, en Cuba se usa polvo de bija. Como última diferencia, la receta del arroz a la chorrera utiliza cerveza para cocinar el arroz.
            - paragraph [ref=e219]:
              - text: La pinta de este delicioso plato cubano es increíble. Seguro que no puedes evitar repetir y trasladarte a esa mesa cubana de la que hablamos al principio del artículo. Disfruta mucho de la experiencia gastronómica. Si el espíritu cubano te ha invadido, te recomendamos hacer esta
              - link "ropa vieja cubana con guarnición de arroz blanco" [ref=e220] [cursor=pointer]:
                - /url: https://www.abc.es/recetasderechupete/como-hacer-una-ropa-vieja-cubana-con-guarnicion-de-arroz-blanco/55820/
                - strong [ref=e221]: ropa vieja cubana con guarnición de arroz blanco
              - text: como siguiente plato.
            - paragraph [ref=e222]: "Última revisión: 1 enero 2025"
